services:
  web:
    build: .
    init: true
    environment: &app_env
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:8000}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-false}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/restaurant_os}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_placeholder}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-dev-placeholder-secret}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-dev-placeholder-webhook-secret}
      RUN_MIGRATIONS: "1"
      COLLECT_STATIC: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports: ["8000:8000"]
    volumes:
      - static-data:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10
  worker:
    build: .
    init: true
    environment:
      <<: *app_env
      RUN_MIGRATIONS: "0"
      COLLECT_STATIC: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -l INFO
  beat:
    build: .
    init: true
    environment:
      <<: *app_env
      RUN_MIGRATIONS: "0"
      COLLECT_STATIC: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat -l INFO
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: restaurant_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restaurant_os"]
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
  nginx:
    image: nginx:1.25-alpine
    volumes:
      - "./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro"
      - "static-data:/staticfiles:ro"
    ports: ["80:80"]
    depends_on:
      web:
        condition: service_healthy
volumes:
  postgres-data:
  redis-data:
  static-data:
