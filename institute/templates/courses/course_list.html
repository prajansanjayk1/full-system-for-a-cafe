{% extends 'base.html' %}
{% block content %}<section class="max-w-7xl mx-auto px-4 py-12"><h1 class="text-3xl font-bold mb-6">Courses</h1><div class="grid md:grid-cols-3 gap-5">{% for course in courses %}<a href="{{ course.get_absolute_url }}" class="bg-white p-4 rounded-xl shadow"><img src="{{ course.image.url }}" alt="{{ course.title }}" class="h-40 w-full object-cover rounded"><h2 class="mt-3 font-semibold">{{ course.title }}</h2><p>{{ course.class_level }}</p></a>{% empty %}<p>No courses yet.</p>{% endfor %}</div></section>{% endblock %}
