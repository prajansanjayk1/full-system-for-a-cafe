{% extends 'base.html' %}
{% block content %}
<section class="max-w-3xl mx-auto px-4 py-12">
  <h1 class="text-3xl font-bold mb-4">Book Free Demo Class</h1>
  <p class="text-gray-600 mb-6">Enroll for expert guidance in Class 10 Maths tuition and Class 12 Physics coaching in Chennai.</p>
  <form method="post" class="bg-white p-6 rounded-xl shadow space-y-4">{% csrf_token %}
    {{ form.as_p }}
    <button class="bg-brand text-white px-5 py-2 rounded-lg" type="submit">Submit Registration</button>
  </form>
</section>
{% endblock %}
